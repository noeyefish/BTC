<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחירי קריפטו בלייב</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center;
            overflow-x: hidden;
            padding-top: 60px;
        }
        
        /* Settings Button (Side Tab) */
        #settingsBtn {
            position: fixed;
            top: 40px;
            right: 0;
            background: #111;
            border: 1px solid #333;
            border-right: none;
            color: #888;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 15px 12px 20px;
            border-radius: 20px 0 0 20px; /* Rounded only on the left */
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: -4px 4px 20px rgba(0,0,0,0.6);
        }
        #settingsBtn:hover {
            color: #fff;
            background: #1a1a1a;
            padding-right: 25px; /* Slide out slightly on hover */
        }
        #settingsBtn svg {
            transition: transform 0.5s ease;
        }
        #settingsBtn:hover svg {
            transform: rotate(90deg);
        }

        /* Overlay */
        #settingsOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 200;
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        #settingsOverlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* Sidebar */
        #settingsSidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 380px;
            height: 100vh;
            background-color: #111;
            z-index: 201;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            border-left: 1px solid #333;
            text-align: right;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #settingsSidebar.open {
            right: 0;
        }

        .sidebar-header {
            padding: 25px 30px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 {
            margin: 0;
            color: #fff;
            font-size: 1.4rem;
        }
        .close-sidebar {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
        }
        .close-sidebar:hover { color: #fff; }

        .sidebar-content {
            padding: 25px 30px;
            flex-grow: 1;
        }
        .sidebar-section-title {
            color: #f7931a;
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .symbol-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: #1a1a1a;
            color: white;
            font-size: 1rem;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #f7931a;
        }
        button.add-btn {
            background-color: #f7931a;
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        button.add-btn:hover { background-color: #ff9f2c; }
        button.add-btn:active { transform: scale(0.95); }

        .active-coins-list {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .active-coins-list li {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .remove-coin {
            color: #888;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .remove-coin:hover { color: #ff4757; }

        /* Coins Display Area - Responsive Grid */
        #coinsContainer {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1600px;
            padding: 0 40px 100px 40px;
            box-sizing: border-box;
            align-items: start;
        }
        
        @media (max-width: 500px) {
            #coinsContainer {
                grid-template-columns: 1fr;
                padding: 0 20px 100px 20px;
            }
        }
        
        .coin-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #111; /* Darker, solid background for pro look */
            padding: 25px 15px;
            border-radius: 16px;
            border: 1px solid #222;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        
        .coin-card:hover {
            border-color: #333;
        }

        .coin-title {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: #888;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .price-display {
            font-size: clamp(2.5rem, 6vw, 6rem); /* Balanced size for grid */
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
            transition: color 0.3s ease;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        
        /* 24h Stats row */
        .stats-row {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stats-group {
            display: flex;
            gap: 30px;
            padding: 5px 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }
        .stats-group.one-hour {
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            color: #444;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .stat-value {
            font-size: clamp(0.9rem, 2.5vw, 1.6rem);
            color: #ccc;
            font-weight: 600;
        }
        .one-hour .stat-label { color: #556; }
        .one-hour .stat-value { color: #627eea; } /* Light blueish for 1h */

        .hidden { display: none !important; }

        /* Status Colors - GLOW BASE */
        .up { color: #00ff88 !important; }
        .down { color: #ff4757 !important; }
        
        /* Premium multi-layered glow */
        .glow-active.up { text-shadow: 0 0 10px rgba(0, 255, 136, 0.6), 0 0 25px rgba(0, 255, 136, 0.15); }
        .glow-active.down { text-shadow: 0 0 10px rgba(255, 71, 87, 0.6), 0 0 25px rgba(255, 71, 87, 0.15); }
        
        /* Special styles */
        .btc-price { color: #f7931a; }
        .eth-price { color: #627eea; }
        
        .glow-active.btc-price { text-shadow: 0 0 10px rgba(247, 147, 26, 0.6), 0 0 30px rgba(247, 147, 26, 0.2); }
        .glow-active.eth-price { text-shadow: 0 0 10px rgba(98, 126, 234, 0.6), 0 0 30px rgba(98, 126, 234, 0.2); }


        /* Status Indicator */
        .status-indicator {
            font-size: 0.85rem;
            margin-top: 5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-ok { color: #00ff88; }
        .status-warn { color: #f7931a; }
        .status-error { color: #ff4757; }

        /* Toggle Switch UI */
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #f7931a; }
        input:checked + .slider:before { transform: translateX(24px); }

        .error-msg {
            color: #ff4757;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }

        /* Anim for updates */
        @keyframes flash {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .flashing { animation: flash 0.1s ease-out; }

        /* Chart Styles */
        .chart-container {
            width: 100%;
            height: 220px; /* Taller chart for pro view */
            margin-top: 25px;
            position: relative;
            background: #0d0d0d; /* Very dark background for chart area */
            border-radius: 8px;
            padding: 10px 0 5px 10px;
            box-sizing: border-box;
            border: 1px solid #1a1a1a;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>

</head>
<body>
    <button id="settingsBtn" title="פתיחת הגדרות">
        <svg fill="currentColor" width="22" height="22" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg> 
        <span>הגדרות</span>
    </button>

    <div id="settingsOverlay"></div>

    <div id="settingsSidebar">
        <div class="sidebar-header">
            <h2>הגדרות</h2>
            <button id="closeSidebarBtn" class="close-sidebar">✖</button>
        </div>
        
        <div class="sidebar-content">
            <h3 class="sidebar-section-title">עיצוב ויזואלי</h3>
            
            <div class="setting-item">
                <span>אפקט Glow (תאורה)</span>
                <label class="switch">
                    <input type="checkbox" id="glowToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-item" style="margin-bottom: 30px;">
                <span>הצגת נתוני שעה (1HR)</span>
                <label class="switch">
                    <input type="checkbox" id="oneHrToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <h3 class="sidebar-section-title">ניהול מטבעות</h3>
            <ul id="activeCoinsList" class="active-coins-list"></ul>
            
            <div class="symbol-input-group">
                <input type="text" id="newCoinInput" placeholder="לדוגמה: SOL, XRP" maxlength="10">
                <button id="addCoinBtn" class="add-btn">הוסף</button>
            </div>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>


    <div id="coinsContainer"></div>

    <script>
        let savedCoins = localStorage.getItem('savedCoins');
        let symbols = savedCoins ? JSON.parse(savedCoins) : ['BTC'];
        
        function saveCoins() {
            localStorage.setItem('savedCoins', JSON.stringify(symbols));
        }

        let glowEnabled = localStorage.getItem('glowEnabled') === 'true';
        let oneHrEnabled = localStorage.getItem('oneHrEnabled') === 'true';
        const websockets = {};
        const lastPrices = {};
        const charts = {};
        const chartData = {}; // Stores { prices: [], labels: [] }
        let currentMinute = new Date().getMinutes();

        const glowToggle = document.getElementById('glowToggle');
        const oneHrToggle = document.getElementById('oneHrToggle');
        
        glowToggle.checked = glowEnabled;
        oneHrToggle.checked = oneHrEnabled;

        glowToggle.onchange = (e) => {
            glowEnabled = e.target.checked;
            localStorage.setItem('glowEnabled', glowEnabled);
            updateGlowClasses();
        };

        oneHrToggle.onchange = (e) => {
            oneHrEnabled = e.target.checked;
            localStorage.setItem('oneHrEnabled', oneHrEnabled);
            updateVisibility();
        };

        function updateVisibility() {
            const groups = document.querySelectorAll('.stats-group.one-hour');
            groups.forEach(el => {
                if (oneHrEnabled) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        }

        function updateGlowClasses() {
            const displays = document.querySelectorAll('.price-display');
            displays.forEach(el => {
                if (glowEnabled) el.classList.add('glow-active');
                else el.classList.remove('glow-active');
            });
        }

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsSidebar = document.getElementById('settingsSidebar');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const addCoinBtn = document.getElementById('addCoinBtn');
        const newCoinInput = document.getElementById('newCoinInput');
        const activeCoinsList = document.getElementById('activeCoinsList');
        const coinsContainer = document.getElementById('coinsContainer');
        const errorMsg = document.getElementById('errorMsg');

        // Sidebar Logic
        function openSidebar() {
            renderActiveCoinsList();
            settingsSidebar.classList.add('open');
            settingsOverlay.classList.add('open');
        }
        function closeSidebar() {
            settingsSidebar.classList.remove('open');
            settingsOverlay.classList.remove('open');
        }

        settingsBtn.onclick = openSidebar;
        closeSidebarBtn.onclick = closeSidebar;
        settingsOverlay.onclick = closeSidebar;

        addCoinBtn.onclick = addNewCoin;
        newCoinInput.onkeypress = (e) => { if (e.key === 'Enter') addNewCoin(); };

        function addNewCoin() {
            let symbol = newCoinInput.value.trim().toUpperCase();
            if (!symbol) return;
            errorMsg.style.display = 'none';
            if (symbols.includes(symbol)) { showError("כבר קיים."); return; }
            
            symbols.push(symbol);
            saveCoins();
            newCoinInput.value = '';
            createCoinElement(symbol);
            connectWebSocket(symbol);
            renderActiveCoinsList();
        }

        function createCoinElement(symbol) {
            const card = document.createElement('div');
            card.className = 'coin-card';
            card.id = `card-${symbol}`;

            let colorClass = '';
            if(symbol === 'BTC') colorClass = 'btc-price';
            if(symbol === 'ETH') colorClass = 'eth-price';

            card.innerHTML = `
                <h2 class="coin-title">${symbol} / USDT</h2>
                <div id="status-${symbol}" class="status-indicator status-warn">⏳ מתחבר...</div>
                <div id="price-${symbol}" class="price-display ${colorClass} ${glowEnabled ? 'glow-active' : ''}">...</div>
                <div class="stats-row">
                    <div class="stats-group">
                        <div class="stat-item">
                            <span class="stat-label">24H High</span>
                            <span id="high-${symbol}" class="stat-value">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">24H Low</span>
                            <span id="low-${symbol}" class="stat-value">-</span>
                        </div>
                    </div>
                    <div class="stats-group one-hour ${oneHrEnabled ? '' : 'hidden'}">
                        <div class="stat-item">
                            <span class="stat-label">1H High</span>
                            <span id="high1h-${symbol}" class="stat-value">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">1H Low</span>
                            <span id="low1h-${symbol}" class="stat-value">-</span>
                        </div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="chart-${symbol}"></canvas>
                </div>
            `;

            coinsContainer.appendChild(card);
            lastPrices[symbol] = 0;
            initChart(symbol);
            fetchInitialData(symbol);
        }

        async function fetchInitialData(symbol) {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}USDT&interval=1m&limit=60`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                const prices = data.map(candle => parseFloat(candle[4]));
                const labels = data.map(candle => {
                    const date = new Date(candle[0]);
                    return date.getHours() + ':' + date.getMinutes().toString().padStart(2, '0');
                });

                chartData[symbol] = { prices, labels };
                updateChartFull(symbol);
            } catch (error) {
                console.error(`Error fetching history for ${symbol}:`, error);
                const statusEl = document.getElementById(`status-${symbol}`);
                if (statusEl) {
                    statusEl.innerText = '⚠️ שגיאה בטעינת היסטוריה';
                    statusEl.className = 'status-indicator status-error';
                }
            }
        }

        const currentPricePlugin = {
            id: 'currentPriceHighlight',
            afterDraw: (chart) => {
                if (!chart.data.datasets || !chart.data.datasets.length) return;
                const dataset = chart.data.datasets[0];
                const prices = dataset.data;
                if (!prices || prices.length === 0) return;
                
                const lastPrice = prices[prices.length - 1];
                const ctx = chart.ctx;
                const yAxis = chart.scales.y;
                
                // Only draw if Y axis is visible and setup
                if (!yAxis) return;

                const yCoord = yAxis.getPixelForValue(lastPrice);
                
                ctx.save();
                ctx.fillStyle = dataset.borderColor;
                
                const text = lastPrice.toFixed(lastPrice < 10 ? 4 : 2);
                ctx.font = 'bold 11px sans-serif';
                const textWidth = ctx.measureText(text).width;
                
                const paddingX = 6;
                const paddingY = 4;
                const boxHeight = 20;
                
                const boxX = yAxis.left; 
                const boxY = yCoord - boxHeight/2;
                
                // Draw background box
                ctx.fillRect(boxX, boxY, yAxis.width, boxHeight);
                
                // Draw text
                ctx.fillStyle = '#000'; // Dark text on the bright background
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, boxX + yAxis.width/2, yCoord + 1);
                
                ctx.restore();
            }
        };

        function initChart(symbol) {
            const ctx = document.getElementById(`chart-${symbol}`).getContext('2d');
            
            // Determine gradient color based on coin
            let color = '#fff';
            if (symbol === 'BTC') color = '#f7931a';
            else if (symbol === 'ETH') color = '#627eea';
            else color = '#00ff88';

            charts[symbol] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Price',
                        data: [],
                        borderColor: color,
                        borderWidth: 1.5,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        pointHoverBackgroundColor: color,
                        tension: 0, // 0 For straight jagged lines like real trading charts, or 0.1 for slight smooth
                        fill: true,
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            const rgb = color.startsWith('#') ? hexToRgbOnly(color) : '255, 255, 255';
                            gradient.addColorStop(0, `rgba(${rgb}, 0.15)`); // Subtle fill at the top
                            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); // Fade to transparent
                            return gradient;
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { right: 5 } // Space for the Y axis label bleed
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(20, 20, 20, 0.9)',
                            titleColor: '#888',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                title: function(context) {
                                    return symbol + ' - ' + context[0].label;
                                },
                                label: function(context) {
                                    return 'Price: $' + context.parsed.y.toLocaleString();
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            display: true,
                            grid: { display: false },
                            ticks: {
                                color: '#666',
                                font: { size: 10 },
                                maxTicksLimit: 6,
                                autoSkip: true,
                                maxRotation: 0
                            }
                        },
                        y: {
                            display: true,
                            position: 'right',
                            grid: { 
                                color: 'rgba(255, 255, 255, 0.05)', 
                                drawBorder: false 
                            },
                            ticks: {
                                color: '#666',
                                font: { size: 10 },
                                maxTicksLimit: 8
                            },
                            suggestedMin: (val) => val.min * 0.999,
                            suggestedMax: (val) => val.max * 1.001
                        }
                    },
                    animation: { duration: 0 } // No animation makes it feel more responsive/pro
                },
                plugins: [currentPricePlugin]
            });

        }

        function hexToRgbOnly(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function updateChartFull(symbol) {
            const chart = charts[symbol];
            if (!chart || !chartData[symbol]) return;

            chart.data.labels = chartData[symbol].labels;
            chart.data.datasets[0].data = chartData[symbol].prices;
            chart.update('none');
        }

        function connectWebSocket(symbol) {
            const s = symbol.toLowerCase();
            // Streams: ticker (24h stats), ticker_1h (1h stats), trade (real-time price)
            const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${s}usdt@ticker/${s}usdt@ticker_1h/${s}usdt@trade`);
            websockets[symbol] = ws;

            ws.onopen = () => {
                const statusEl = document.getElementById(`status-${symbol}`);
                if (statusEl) {
                    statusEl.innerHTML = '● Live';
                    statusEl.className = 'status-indicator status-ok';
                }
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                const stream = msg.stream;
                const d = msg.data;
                
                const el = document.getElementById(`price-${symbol}`);
                if(!el) return;

                const fmt = (num, prec) => '$' + num.toLocaleString('en-US', { minimumFractionDigits: prec, maximumFractionDigits: prec });

                if (stream.includes('@trade')) {
                    // REAL-TIME PRICE (updates on every single trade)
                    const price = parseFloat(d.p);
                    const prec = price < 1 ? 4 : 2;
                    const formattedPrice = fmt(price, prec);
                    el.innerText = formattedPrice;

                    // Update Tab Title with the first coin's price
                    if (symbols[0] === symbol) {
                        document.title = `${formattedPrice} | ${symbol}`;
                    }

                    if (price > lastPrices[symbol] && lastPrices[symbol] !== 0) {
                        el.classList.remove('down');
                        el.classList.add('up');
                    } else if (price < lastPrices[symbol] && lastPrices[symbol] !== 0) {
                        el.classList.remove('up');
                        el.classList.add('down');
                    }
                    
                    // Update Chart Live
                    if (charts[symbol] && chartData[symbol]) {
                        const prices = chartData[symbol].prices;
                        if (prices.length > 0) {
                            prices[prices.length - 1] = price;
                            charts[symbol].update('none');
                        }
                    }

                    lastPrices[symbol] = price;

                    // Check for minute shift
                    const now = new Date();
                    if (now.getMinutes() !== currentMinute) {
                        currentMinute = now.getMinutes();
                        symbols.forEach(s => {
                            if (chartData[s] && lastPrices[s]) {
                                chartData[s].prices.push(lastPrices[s]);
                                chartData[s].prices.shift();
                                const timeStr = now.getHours() + ':' + now.getMinutes().toString().padStart(2, '0');
                                chartData[s].labels.push(timeStr);
                                chartData[s].labels.shift();
                                updateChartFull(s);
                            }
                        });
                    }
                } else if (stream.includes('@ticker') && !stream.includes('_1h')) {
                    // 24H STATS
                    const high = parseFloat(d.h);
                    const prec = high < 1 ? 4 : 2;
                    document.getElementById(`high-${symbol}`).innerText = fmt(high, prec);
                    document.getElementById(`low-${symbol}`).innerText = fmt(parseFloat(d.l), prec);
                } else if (stream.includes('@ticker_1h')) {
                    // 1H STATS
                    const high = parseFloat(d.h);
                    const prec = high < 1 ? 4 : 2;
                    document.getElementById(`high1h-${symbol}`).innerText = fmt(high, prec);
                    document.getElementById(`low1h-${symbol}`).innerText = fmt(parseFloat(d.l), prec);
                }
            };

            ws.onerror = () => {
                const statusEl = document.getElementById(`status-${symbol}`);
                if (statusEl) {
                    statusEl.innerText = '❌ שגיאת חיבור';
                    statusEl.className = 'status-indicator status-error';
                }
            };

            ws.onclose = () => {
                // Check if it was intentionally removed from the dashboard
                if (!symbols.includes(symbol)) return;

                const statusEl = document.getElementById(`status-${symbol}`);
                if (statusEl) {
                    statusEl.innerText = '↻ מנסה להתחבר מחדש...';
                    statusEl.className = 'status-indicator status-warn';
                }
                
                // Try to reconnect after 5 seconds
                setTimeout(() => connectWebSocket(symbol), 5000);
            };
        }

        function renderActiveCoinsList() {
            activeCoinsList.innerHTML = '';
            symbols.forEach(s => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${s}</span><button class="remove-coin" onclick="removeCoin('${s}')">✖</button>`;
                activeCoinsList.appendChild(li);
            });
        }

        window.removeCoin = function(s) {
            symbols = symbols.filter(x => x !== s);
            saveCoins();
            if(websockets[s]) { websockets[s].close(); delete websockets[s]; }
            if(charts[s]) { charts[s].destroy(); delete charts[s]; }
            if(chartData[s]) { delete chartData[s]; }
            const card = document.getElementById(`card-${s}`);
            if(card) card.remove();
            renderActiveCoinsList();
        };

        function showError(msg) { errorMsg.innerText = msg; errorMsg.style.display = 'block'; }

        function init() {
            coinsContainer.innerHTML = '';
            symbols.forEach(s => { createCoinElement(s); connectWebSocket(s); });
        }

        init();
    </script>
</body>
</html>
